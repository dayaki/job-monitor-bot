# .github/workflows/job-monitor.yml
# GitHub Actions Workflow for Job Monitoring Bot

name: Job Monitor Bot

on:
  schedule:
    # Run every 3 hours at minute 0 (00:00, 03:00, 06:00, etc.)
    - cron: "0 */3 * * *"

  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

concurrency:
  group: job-monitor-${{ github.ref }}
  cancel-in-progress: false

jobs:
  search-jobs:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to commit and push changes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download previous seen jobs
        continue-on-error: true
        run: |
          if [ -f seen_jobs.json ]; then
            echo "Found existing seen_jobs.json"
          else
            echo "No previous seen_jobs.json found, creating empty one"
            echo "{}" > seen_jobs.json
          fi

      - name: Run job search
        env:
          SEARCH_KEYWORDS: ${{ secrets.SEARCH_KEYWORDS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}
        run: |
          python job_monitor.py

      - name: Commit and push seen jobs
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add seen_jobs.json
          if ! git diff --quiet --cached; then
            git commit -m "Update seen jobs [skip ci]"
            for attempt in 1 2 3; do
              if git pull --rebase origin "${GITHUB_REF_NAME}"; then
                if git push; then
                  echo "✓ Seen jobs updated and pushed"
                  exit 0
                fi
              else
                git rebase --abort || true
              fi
              echo "Retrying push (attempt ${attempt}/3)"
              sleep $((attempt * 2))
            done
            echo "::error::Failed to push seen_jobs.json after 3 attempts"
            exit 1
          else
            echo "ℹ No changes to seen jobs"
          fi

---
# Alternative schedule options (choose one and replace the cron line above):

# Every 2 hours:
# - cron: '0 */2 * * *'

# Every 3 hours:
# - cron: '0 */3 * * *'

# Every 6 hours:
# - cron: '0 */6 * * *'

# Every day at 9 AM UTC:
# - cron: '0 9 * * *'

# Every weekday at 9 AM and 5 PM UTC:
# - cron: '0 9,17 * * 1-5'

# Every Monday at 9 AM UTC:
# - cron: '0 9 * * 1'
